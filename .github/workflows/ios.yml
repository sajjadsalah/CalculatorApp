name: iOS Archive (unsigned)

on:
  workflow_dispatch:

jobs:
  archive:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      # ملاحظة: عدّل -scheme إذا كان اسم الـ Scheme مختلف
      - name: Archive (no code signing)
        run: |
          set -euo pipefail
          xcodebuild \
            -project "CalculatorApp/CalculatorApp.xcodeproj" \
            -scheme "CalculatorApp" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$RUNNER_TEMP/CalculatorApp.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            archive

      - name: Upload xcarchive
        uses: actions/upload-artifact@v4
        with:
          name: CalculatorApp-xcarchive
          path: ${{ runner.temp }}/CalculatorApp.xcarchive
